<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Efecto Casimir dinámico - Simulación mínima (p5.js)</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./vendor/p5.min.js"></script>
  </head>
  <body>
    <main class="page">
      <h1>Efecto Casimir dinámico (modelo mínimo de cavidad)</h1>
      <p class="subtitle">Dos espejos en vacío: la oscilación puede generar luz visible</p>
      <div id="controls" class="controls"></div>
      <div id="canvas-wrap" class="canvas-wrap"></div>
      <p class="note">
        Modelo: un espejo permanece fijo y el otro oscila. Durante la oscilación,
        aparecen fotones/ondas entre los espejos. Una mayor rapidez de oscilación
        produce mayor intensidad visual.
      </p>
    </main>
    <script src="./sketch.js"></script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casimir dinámico (p5.js)</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./vendor/p5.min.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>Casimir dinámico (p5.js)</h1>
      </header>

      <section class="panel controls-panel">
        <div id="controls" class="controls"></div>
      </section>

      <section class="panel visual-panel">
        <div id="canvas-wrap" class="canvas-wrap"></div>
      </section>

      <section class="panel metrics-panel">
        <div class="metrics-grid">
          <article class="metric-card"><span>Modo</span><strong id="m-mode">No acelerado</strong></article>
          <article class="metric-card"><span>Separación</span><strong id="m-gap">—</strong></article>
          <article class="metric-card"><span>Frecuencia</span><strong id="m-freq">—</strong></article>
          <article class="metric-card"><span>Intensidad</span><strong id="m-intensity">—</strong></article>
        </div>
      </section>
    </main>
    <script src="./sketch.js"></script>
  </body>
</html>
